name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install BLAS / LAPACK
        run: |
          sudo apt-get update
          # `zstd` is required by our toolchain-install fallback.
          sudo apt-get install -y liblapack-dev libblas-dev gfortran zstd

      # Install elan and the toolchain pinned in lean-toolchain. We retry
      # via elan first, then fall back to a direct GitHub-release download
      # because the canonical release server is intermittently unreachable.
      - name: Install elan and Lean toolchain
        shell: bash
        run: |
          set -e
          if ! command -v elan >/dev/null 2>&1; then
            curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
            sh elan-init.sh -y --default-toolchain none
          fi
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.elan/bin:$PATH"
          ./scripts/install-toolchain.sh

      - name: Build
        run: lake build

      - name: Run example
        run: |
          ./.lake/build/bin/csdp-example > /tmp/csdp.out 2>&1
          tail -10 /tmp/csdp.out
          # Sanity: example main exits 0 only if pobj is within tol of 2.75.

  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install zstd (for toolchain fallback)
        run: brew install zstd

      # The lakefile hard-codes the Command Line Tools SDK path so that the
      # build works without any IO at lake configuration time. macOS runners
      # ship with Xcode but not always with CLT at /Library/Developer/...,
      # so we ensure that path exists by symlinking the active SDK there.
      - name: Ensure CLT SDK symlink
        run: |
          sdk_path="$(xcrun --show-sdk-path)"
          target="/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk"
          echo "active sdk: $sdk_path"
          if [ ! -d "$target" ]; then
            sudo mkdir -p "$(dirname "$target")"
            sudo ln -sfn "$sdk_path" "$target"
          fi
          ls -ld "$target"

      # Install elan and the toolchain pinned in lean-toolchain. We retry
      # via elan first, then fall back to a direct GitHub-release download
      # because the canonical release server is intermittently unreachable.
      - name: Install elan and Lean toolchain
        shell: bash
        run: |
          set -e
          if ! command -v elan >/dev/null 2>&1; then
            curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
            sh elan-init.sh -y --default-toolchain none
          fi
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.elan/bin:$PATH"
          ./scripts/install-toolchain.sh

      - name: Build
        run: lake build

      - name: Run example
        run: |
          ./.lake/build/bin/csdp-example > /tmp/csdp.out 2>&1
          tail -10 /tmp/csdp.out

  windows:
    name: Windows (MSYS2 / mingw-w64)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-openblas
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gcc-fortran
            git
            curl
            unzip

      # On Windows the elan installer is the .exe variant inside a zip.
      # We invoke it via cmd.exe so the install completes in a normal
      # Windows console environment, then point PATH at the elan and
      # mingw64 bin dirs (translated to MSYS2 paths).
      - name: Install elan
        run: |
          set -e
          curl -sSf -L https://github.com/leanprover/elan/releases/latest/download/elan-x86_64-pc-windows-msvc.zip -o elan-init.zip
          unzip -q elan-init.zip
          ELAN_INIT_WIN="$(cygpath -w "$PWD/elan-init.exe")"
          cmd.exe //c "\"$ELAN_INIT_WIN\" -y --default-toolchain none --no-modify-path"
          ELAN_DIR_WIN="$(cmd.exe //c "echo %USERPROFILE%\\.elan" | tr -d '\r')"
          ELAN_DIR_MSYS="$(cygpath -u "$ELAN_DIR_WIN")"
          ls -la "$ELAN_DIR_MSYS/bin" || (echo "elan install did not produce expected files" && exit 1)
          echo "ELAN_HOME=$ELAN_DIR_MSYS" >> "$GITHUB_ENV"
          echo "$ELAN_DIR_MSYS/bin" >> "$GITHUB_PATH"
          echo "/c/msys64/mingw64/bin" >> "$GITHUB_PATH"

      - name: Install Lean toolchain
        run: ./scripts/install-toolchain.sh

      - name: Build
        run: lake build

      - name: Run example
        run: |
          ./.lake/build/bin/csdp-example.exe > /tmp/csdp.out 2>&1 || true
          tail -10 /tmp/csdp.out
