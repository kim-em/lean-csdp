name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install BLAS / LAPACK
        run: |
          sudo apt-get update
          sudo apt-get install -y liblapack-dev libblas-dev gfortran

      # Install elan + the toolchain pinned in lean-toolchain. We do this
      # manually with a retry loop because the public release server has
      # been intermittently flaky during our CI runs.
      - name: Install elan and Lean toolchain (with retries)
        shell: bash
        run: |
          set -e
          if ! command -v elan >/dev/null 2>&1; then
            curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
            sh elan-init.sh -y --default-toolchain none
          fi
          export PATH="$HOME/.elan/bin:$PATH"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          toolchain="$(tr -d '\r\n' < lean-toolchain)"
          echo "Installing toolchain: $toolchain"
          for attempt in 1 2 3 4 5; do
            if elan toolchain install --no-self-update "$toolchain"; then
              break
            fi
            echo "Toolchain install attempt $attempt failed; retrying in 30s..."
            sleep 30
          done
          elan default "$toolchain"
          lean --version

      - name: Build
        run: lake build

      - name: Run example
        run: |
          ./.lake/build/bin/csdp-example > /tmp/csdp.out 2>&1
          tail -10 /tmp/csdp.out
          # Sanity: example main exits 0 only if pobj is within tol of 2.75.

  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # The lakefile hard-codes the Command Line Tools SDK path so that the
      # build works without any IO at lake configuration time. macOS runners
      # ship with Xcode but not always with CLT at /Library/Developer/...,
      # so we ensure that path exists by symlinking the active SDK there.
      - name: Ensure CLT SDK symlink
        run: |
          sdk_path="$(xcrun --show-sdk-path)"
          target="/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk"
          echo "active sdk: $sdk_path"
          if [ ! -d "$target" ]; then
            sudo mkdir -p "$(dirname "$target")"
            sudo ln -sfn "$sdk_path" "$target"
          fi
          ls -ld "$target"

      # Install elan + the toolchain pinned in lean-toolchain. We do this
      # manually with a retry loop because the public release server has
      # been intermittently flaky during our CI runs.
      - name: Install elan and Lean toolchain (with retries)
        shell: bash
        run: |
          set -e
          if ! command -v elan >/dev/null 2>&1; then
            curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
            sh elan-init.sh -y --default-toolchain none
          fi
          export PATH="$HOME/.elan/bin:$PATH"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          toolchain="$(tr -d '\r\n' < lean-toolchain)"
          echo "Installing toolchain: $toolchain"
          for attempt in 1 2 3 4 5; do
            if elan toolchain install --no-self-update "$toolchain"; then
              break
            fi
            echo "Toolchain install attempt $attempt failed; retrying in 30s..."
            sleep 30
          done
          elan default "$toolchain"
          lean --version

      - name: Build
        run: lake build

      - name: Run example
        run: |
          ./.lake/build/bin/csdp-example > /tmp/csdp.out 2>&1
          tail -10 /tmp/csdp.out

  windows:
    name: Windows (MSYS2 / mingw-w64)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-openblas
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gcc-fortran
            git
            curl
            unzip

      # The Lean toolchain installer expects a POSIX shell; MSYS2 fits the
      # bill. We retry the toolchain install because the public release
      # server has been intermittently flaky during our CI runs.
      - name: Install elan and Lean toolchain (with retries)
        run: |
          set -e
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
          sh elan-init.sh -y --default-toolchain none
          export PATH="$HOME/.elan/bin:$PATH"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          echo "/c/msys64/mingw64/bin" >> "$GITHUB_PATH"
          toolchain="$(tr -d '\r\n' < lean-toolchain)"
          for attempt in 1 2 3 4 5; do
            if elan toolchain install --no-self-update "$toolchain"; then
              break
            fi
            echo "Toolchain install attempt $attempt failed; retrying in 30s..."
            sleep 30
          done
          elan default "$toolchain"
          lean --version

      - name: Build
        run: |
          export PATH="$HOME/.elan/bin:$PATH"
          lake build

      - name: Run example
        run: |
          export PATH="$HOME/.elan/bin:$PATH"
          ./.lake/build/bin/csdp-example.exe > /tmp/csdp.out 2>&1 || true
          tail -10 /tmp/csdp.out
